services:
  api:
    build: ./backend
    container_name: contracts_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      # монтируем код внутрь контейнера, чтобы правки на хосте сразу подхватывались
      # (вместе с --reload в команде запуска) — удобно на этапе разработки
      - ./backend/app:/app/app
      # статика (HTML-интерфейс) — правки видны без пересборки
      - ./backend/static:/app/static
      # новые ревизии Alembic тоже должны быть видны без пересборки образа
      - ./backend/alembic:/app/alembic
      - ./backend/alembic.ini:/app/alembic.ini
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  converter:
    build: ./converter
    container_name: contracts_converter
    # api обращается к converter по имени сервиса внутри docker-сети
    # (см. CONVERTER_URL=http://converter:8090 в app/config.py), наружу
    # порт пробрасывать не нужно — это внутренний сервис, не публичный API.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  db:
    image: postgres:16
    container_name: contracts_db
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports наружу больше НЕТ — порт 5432 был открыт всему интернету, а в базе
    # лежат хэши паролей и паспортные данные контрагентов. api достаёт db по
    # внутреннему docker-имени ("db:5432"), внешний доступ ему не нужен.
    # Если понадобится посмотреть базу с хоста через DBeaver/pgAdmin — поднять
    # временный SSH-туннель: `ssh -L 5432:localhost:5432 root@64.188.98.101`
    # и подключаться к localhost:5432 у себя на компьютере, порт наружу не открывая.
    #
    # Правка этих строк сама по себе НИЧЕГО не закрыла: с 09.07 по 17.07.2026
    # порт оставался открыт, потому что контейнер работал старый — проброс
    # снимается только `docker compose up -d db`. См. подробнее у minio ниже.
    healthcheck:
      # docker-compose не запустит api, пока Postgres не ответит на этот тест —
      # это и даёт condition: service_healthy выше
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio
    container_name: contracts_minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    # ports наружу НЕТ — за ними лежат все шаблоны договоров компании.
    # api ходит в minio по внутреннему docker-имени ("minio:9000", см.
    # MINIO_ENDPOINT в .env и storage.py), presigned-ссылок мы не выдаём:
    # файлы читает сам backend и отдаёт их клиенту через свой эндпоинт.
    # Значит наружу не нужен ни один из двух портов.
    #
    # 9000 (S3 API) был опаснее 9001: консоль хотя бы спрашивает пароль, а
    # S3 API — это полный доступ к бакету по root-ключу из .env.
    #
    # Если понадобится веб-консоль — временный SSH-туннель, как и для
    # Postgres выше: `ssh -L 9001:localhost:9001 root@64.188.98.101`,
    # затем http://localhost:9001 у себя в браузере.
    #
    # ВАЖНО: убрать ports из этого файла НЕДОСТАТОЧНО. Проброс живёт в уже
    # созданном контейнере, а не в compose-файле, и снимается только
    # пересозданием: `docker compose up -d minio`. Ровно на этом обжёгся
    # db — правка была здесь с 09.07.2026, а порт 5432 всё это время
    # оставался открыт всему интернету, потому что контейнер не пересоздали
    # (проверено 17.07.2026). ufw не спасает: docker пишет свои правила в
    # цепочку DOCKER в обход ufw, и его "порт не разрешён" здесь ничего не значит.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  miniodata:
